<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicken Eating Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Arial Black', Arial, sans-serif;
      background: #000;
    }

    /* ─── GAME AREA ─── */
    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #87CEEB 0%, #c9eaf7 55%, #6ab04c 55%, #4a8c25 100%);
      overflow: hidden;
    }

    #game::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 18px,
        rgba(0,0,0,.06) 18px, rgba(0,0,0,.06) 20px
      );
      pointer-events: none;
    }

    /* Clouds */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: .85;
    }

    /* ─── HUD ─── */
    #hud {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      align-items: center;
      z-index: 100;
    }
    #launchBtn {
      padding: 14px 28px;
      font-size: 1.2rem;
      background: linear-gradient(145deg, #ff4500, #cc2200);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 900;
      box-shadow: 0 5px 18px rgba(255,69,0,.55);
      transition: transform .1s, box-shadow .1s;
      text-shadow: 1px 1px 2px rgba(0,0,0,.4);
    }
    #launchBtn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 7px 22px rgba(255,69,0,.7); }
    #launchBtn:active:not(:disabled) { transform: scale(.97); }
    #launchBtn:disabled { background: #666; box-shadow: none; cursor: default; }

    #scoreBox {
      padding: 10px 22px;
      background: rgba(0,0,0,.45);
      border: 2px solid rgba(255,255,255,.3);
      border-radius: 12px;
      color: #ffe600;
      font-size: 1.3rem;
      font-weight: 900;
      text-shadow: 0 0 8px #ff6600;
    }

    #hint {
      position: absolute;
      top: 82px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.9);
      font-size: 1rem;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,.6);
      background: rgba(0,0,0,.25);
      padding: 6px 18px;
      border-radius: 20px;
      z-index: 100;
      white-space: nowrap;
    }

    /* ─── CHICKEN ─── */
    #chicken {
      position: absolute;
      width: 80px;
      height: 80px;
      display: none;
      z-index: 50;
      user-select: none;
      pointer-events: none;
      transform-origin: center center;
      transition: transform 0s, opacity 0s;
    }
    #chicken svg { width: 100%; height: 100%; }
    #chicken.running { animation: bobRun .18s steps(1) infinite; }
    @keyframes bobRun {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-6px); }
    }
    #chicken.stopped {
      animation: chickenIdle .6s ease-in-out infinite alternate;
    }
    @keyframes chickenIdle {
      from { transform: scale(1.1) rotate(-3deg); }
      to   { transform: scale(1.1) rotate(3deg); }
    }
    #chicken.scared {
      animation: chickenScared .08s ease-in-out infinite alternate;
    }
    @keyframes chickenScared {
      from { transform: scale(1.1) rotate(-6deg) translateX(-3px); }
      to   { transform: scale(1.1) rotate(6deg) translateX(3px); }
    }
    #chicken.beingEaten {
      animation: none;
      transition: transform 0.35s ease-in, opacity 0.35s ease-in !important;
    }

    /* ─── PLAYER FACE ─── */
    #faceWrap {
      position: absolute;
      width: 140px;
      height: 140px;
      cursor: grab;
      z-index: 60;
      user-select: none;
      touch-action: none;
    }
    #faceWrap:active { cursor: grabbing; }

    #faceCanvas {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      display: block;
    }
    #faceWrap.near #faceCanvas  { box-shadow: 0 0 0 4px #ffe600, 0 0 28px #ffe600; }
    #faceWrap.eating #faceCanvas { box-shadow: 0 0 0 4px #ff4500, 0 0 34px #ff4500; }

    /* ─── DRAG LABEL ─── */
    #dragArrow {
      position: absolute;
      left: 50%; top: -40px;
      transform: translateX(-50%);
      color: #ffe600;
      font-size: 1.5rem;
      animation: bounce .5s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes bounce { from { top: -40px; } to { top: -30px; } }

    /* ─── EXPLOSION LAYER ─── */
    #explosionLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 200;
    }
    .spark {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkFly var(--dur,.7s) ease-out forwards;
    }
    @keyframes sparkFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
    }
    .bigBoom {
      position: absolute;
      font-size: 90px;
      pointer-events: none;
      animation: boomAnim .7s ease-out forwards;
    }
    @keyframes boomAnim {
      0%   { transform: scale(.3) rotate(-15deg); opacity: 1; }
      60%  { transform: scale(2.2) rotate(10deg); opacity: 1; }
      100% { transform: scale(3)   rotate(20deg); opacity: 0; }
    }
    .feather {
      position: absolute;
      font-size: 28px;
      pointer-events: none;
      animation: featherFly var(--dur,.9s) ease-out forwards;
    }
    @keyframes featherFly {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx),var(--ty)) rotate(var(--rot,360deg)); opacity: 0; }
    }
    .comboText {
      position: absolute;
      font-size: 2.5rem;
      font-weight: 900;
      color: #ffe600;
      text-shadow: 2px 2px 0 #c00, 0 0 20px #ff6600;
      pointer-events: none;
      z-index: 300;
      animation: comboRise 1s ease-out forwards;
    }
    @keyframes comboRise {
      0%   { transform: translateY(0) scale(.5); opacity: 1; }
      60%  { transform: translateY(-60px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-120px) scale(1); opacity: 0; }
    }

    /* ─── BALLOON ─── */
    #balloonWrap {
      position: absolute;
      left: 50%;
      bottom: -220px;
      transform: translateX(-50%);
      display: none;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      z-index: 500;
    }
    #balloonWrap.floating {
      display: flex;
      animation: balloonRise 2.8s ease-out forwards;
    }
    @keyframes balloonRise {
      0%   { bottom: -220px; opacity: 0; }
      8%   { opacity: 1; }
      100% { bottom: 32%; opacity: 1; }
    }
    #balloonBody {
      width: 110px;
      height: 120px;
      background: radial-gradient(ellipse at 35% 28%, #ff9090, #dd1111 55%, #880000);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
      font-weight: 900;
      text-shadow: 1px 1px 3px rgba(0,0,0,.5);
      box-shadow: inset -10px -12px 28px rgba(0,0,0,.3), 0 4px 20px rgba(200,0,0,.4);
      animation: balloonBob 1.8s ease-in-out infinite alternate;
      position: relative;
    }
    /* shine */
    #balloonBody::before {
      content: '';
      position: absolute;
      top: 14%; left: 20%;
      width: 28px; height: 20px;
      background: rgba(255,255,255,.35);
      border-radius: 50%;
      transform: rotate(-30deg);
    }
    @keyframes balloonBob {
      from { transform: rotate(-4deg); }
      to   { transform: rotate(4deg); }
    }
    #balloonKnot {
      width: 0; height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-top: 16px solid #880000;
    }
    #balloonString {
      width: 2px;
      height: 130px;
      background: rgba(100,100,100,.6);
      border-radius: 1px;
    }
    #balloonWrap.popping { pointer-events: none; animation: none !important; }
    #balloonWrap.popping #balloonBody {
      animation: balloonPop .35s ease-out forwards;
    }
    @keyframes balloonPop {
      0%   { transform: scale(1); opacity: 1; }
      35%  { transform: scale(1.6); opacity: 1; }
      100% { transform: scale(.05); opacity: 0; }
    }
    #balloonWrap.popping #balloonKnot,
    #balloonWrap.popping #balloonString { opacity: 0; }

    /* ─── LIGHTNING ─── */
    #flashOverlay {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 600;
    }
    #flashOverlay.flashing {
      animation: flashAnim 1.6s ease-out forwards;
    }
    @keyframes flashAnim {
      0%   { opacity: 0; }
      4%   { opacity: 1; }
      18%  { opacity: .95; }
      100% { opacity: 0; }
    }
    #lightningBolt {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 65vh;
      z-index: 601;
      pointer-events: none;
      opacity: 0;
      filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 20px #ffffaa) drop-shadow(0 0 40px #ffee00);
    }
    #lightningBolt.striking {
      animation: boltAnim 1.3s ease-out forwards;
    }
    @keyframes boltAnim {
      0%   { opacity: 0; }
      3%   { opacity: 1; }
      55%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ─── STUPID ─── */
    #stupidText {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: clamp(4rem, 16vw, 11rem);
      font-weight: 900;
      color: #ff1a00;
      text-shadow: 0 0 30px #ffff00, 0 0 60px #ff6600, 5px 5px 0 #000, -3px -3px 0 #000;
      letter-spacing: .08em;
      pointer-events: none;
      z-index: 700;
      white-space: nowrap;
    }
    #stupidText.visible {
      animation: stupidIn .45s cubic-bezier(.17,.67,.39,1.4) forwards;
    }
    @keyframes stupidIn {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(-12deg); }
      65%  { transform: translate(-50%,-50%) scale(1.18) rotate(4deg); }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
    }
    #stupidText.hiding {
      animation: stupidOut .5s ease-in forwards;
    }
    @keyframes stupidOut {
      from { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      to   { transform: translate(-50%,-50%) scale(.4); opacity: 0; }
    }

    /* ─── RESTART BUTTON ─── */
    #restartBtn {
      position: fixed;
      top: 58%;
      left: 50%;
      transform: translateX(-50%) scale(0);
      padding: 18px 44px;
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(145deg, #00dd55, #009933);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,200,70,.55);
      text-shadow: 1px 1px 3px rgba(0,0,0,.3);
      z-index: 700;
      display: none;
      transition: transform .1s;
    }
    #restartBtn.visible {
      display: block;
      animation: btnPop .4s cubic-bezier(.17,.67,.39,1.4) forwards;
    }
    @keyframes btnPop {
      from { transform: translateX(-50%) scale(0); }
      to   { transform: translateX(-50%) scale(1); }
    }
    #restartBtn:hover { transform: translateX(-50%) scale(1.07) !important; }

    /* ─── RESTART CHICKEN + EGG ─── */
    #restartChicken {
      position: fixed;
      bottom: -130px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 110px;
      z-index: 500;
      display: none;
      pointer-events: none;
    }
    #restartChicken svg { width: 100%; height: 100%; }
    #restartChicken.entering {
      display: block;
      animation: rChickenEnter .55s ease-out forwards;
    }
    @keyframes rChickenEnter {
      from { bottom: -130px; }
      to   { bottom: 22%; }
    }
    #restartChicken.laying {
      bottom: 22%;
      animation: rChickenLay .85s ease-in-out forwards;
    }
    @keyframes rChickenLay {
      0%   { transform: translateX(-50%) translateY(0)    rotate(0deg); }
      20%  { transform: translateX(-50%) translateY(6px)  rotate(-6deg); }
      45%  { transform: translateX(-50%) translateY(16px) rotate(-10deg) scaleX(.93); }
      70%  { transform: translateX(-50%) translateY(8px)  rotate(6deg); }
      100% { transform: translateX(-50%) translateY(0)    rotate(0deg); }
    }

    #eggWrap {
      position: fixed;
      /* left side of chicken = center - half chicken width + ~20% of chicken width */
      left: calc(50% - 52px);
      /* vertically sit just below the chicken's body */
      bottom: calc(22% - 52px);
      z-index: 500;
      display: none;
      cursor: pointer;
      opacity: 0;
    }
    #eggWrap.visible {
      display: block;
      animation: eggSlideOut .5s ease-out forwards;
    }
    @keyframes eggSlideOut {
      0%   { transform: translateX(30px) translateY(-20px) scale(.35) rotate(-20deg); opacity: .7; }
      55%  { transform: translateX(-4px) translateY(2px)   scale(1.06) rotate(4deg);  opacity: 1;  }
      100% { transform: translateX(0)    translateY(0)     scale(1)    rotate(0deg);  opacity: 1;  }
    }
    #egg {
      width: 72px;
      height: 90px;
      background: radial-gradient(ellipse at 38% 28%, #fffef0, #f5e566 40%, #e0b800);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 900;
      color: #444;
      text-align: center;
      line-height: 1.3;
      padding: 10px;
      box-shadow: 2px 4px 14px rgba(0,0,0,.25), inset -5px -6px 14px rgba(0,0,0,.1);
      animation: eggWobble .85s ease-in-out infinite alternate;
    }
    @keyframes eggWobble {
      from { transform: rotate(-7deg) scale(1); }
      to   { transform: rotate(7deg) scale(1.04); }
    }
  </style>
</head>
<body>
<div id="game">

  <!-- Clouds -->
  <div class="cloud" style="width:160px;height:50px;top:8%;left:10%">
    <div style="position:absolute;width:80px;height:80px;top:-40px;left:20px;background:white;border-radius:50%"></div>
    <div style="position:absolute;width:60px;height:60px;top:-30px;left:70px;background:white;border-radius:50%"></div>
  </div>
  <div class="cloud" style="width:120px;height:40px;top:15%;left:60%">
    <div style="position:absolute;width:65px;height:65px;top:-32px;left:15px;background:white;border-radius:50%"></div>
    <div style="position:absolute;width:50px;height:50px;top:-24px;left:60px;background:white;border-radius:50%"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <button id="launchBtn" onclick="launchChicken()">🐔 Launch Chicken!</button>
    <div id="scoreBox">Score: <span id="scoreNum">0</span></div>
  </div>
  <div id="hint">Click the button to send a chicken running!</div>

  <!-- Chicken -->
  <div id="chicken">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="62" rx="28" ry="22" fill="#f5c842"/>
      <circle cx="78" cy="40" r="16" fill="#f5c842"/>
      <circle cx="84" cy="36" r="3.5" fill="#222"/>
      <circle cx="85.2" cy="34.8" r="1" fill="white"/>
      <polygon points="96,40 88,37 88,40" fill="#e07b00"/>
      <polygon points="96,42 88,40 88,44" fill="#c06000"/>
      <ellipse cx="72" cy="26" rx="5" ry="7" fill="#e83030"/>
      <ellipse cx="78" cy="24" rx="4" ry="6" fill="#e83030"/>
      <ellipse cx="90" cy="50" rx="4" ry="6" fill="#e83030"/>
      <ellipse cx="44" cy="60" rx="14" ry="9" fill="#d4a800" transform="rotate(-15 44 60)"/>
      <ellipse cx="22" cy="52" rx="8" ry="5" fill="#c49000" transform="rotate(-40 22 52)"/>
      <ellipse cx="20" cy="58" rx="8" ry="5" fill="#d4a800" transform="rotate(-55 20 58)"/>
      <line x1="46" y1="82" x2="38" y2="96" stroke="#e07b00" stroke-width="4" stroke-linecap="round"/>
      <line x1="54" y1="82" x2="62" y2="98" stroke="#e07b00" stroke-width="4" stroke-linecap="round"/>
      <line x1="38" y1="96" x2="28" y2="96" stroke="#e07b00" stroke-width="3" stroke-linecap="round"/>
      <line x1="62" y1="98" x2="72" y2="98" stroke="#e07b00" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Player face (canvas-rendered with animated mouth) -->
  <div id="faceWrap">
    <div id="dragArrow">👆</div>
    <canvas id="faceCanvas" width="140" height="140"></canvas>
  </div>

  <div id="explosionLayer"></div>

  <!-- ── Balloon ── -->
  <div id="balloonWrap" onclick="popBalloon()">
    <div id="balloonBody">Pop<br>me!</div>
    <div id="balloonKnot"></div>
    <div id="balloonString"></div>
  </div>

  <!-- ── Lightning ── -->
  <div id="flashOverlay"></div>
  <svg id="lightningBolt" viewBox="0 0 100 200" preserveAspectRatio="none">
    <defs>
      <filter id="lglow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- outer glow stroke -->
    <polyline points="50,0 68,48 36,54 64,108 24,116 57,168 40,174 62,200"
      fill="none" stroke="rgba(255,255,100,.6)" stroke-width="12"
      stroke-linejoin="round" filter="url(#lglow)"/>
    <!-- main bright bolt -->
    <polyline points="50,0 68,48 36,54 64,108 24,116 57,168 40,174 62,200"
      fill="none" stroke="white" stroke-width="5"
      stroke-linejoin="round"/>
    <!-- inner core -->
    <polyline points="50,0 68,48 36,54 64,108 24,116 57,168 40,174 62,200"
      fill="none" stroke="#ffffcc" stroke-width="2"
      stroke-linejoin="round"/>
  </svg>

  <!-- ── STUPID ── -->
  <div id="stupidText">STUPID</div>

  <!-- ── Restart button ── -->
  <button id="restartBtn" onclick="startRestartSequence()">🔄 Restart</button>

  <!-- ── Restart chicken + egg ── -->
  <div id="restartChicken">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="62" rx="28" ry="22" fill="#f5c842"/>
      <circle cx="78" cy="40" r="16" fill="#f5c842"/>
      <circle cx="84" cy="36" r="3.5" fill="#222"/>
      <circle cx="85.2" cy="34.8" r="1" fill="white"/>
      <polygon points="96,40 88,37 88,40" fill="#e07b00"/>
      <polygon points="96,42 88,40 88,44" fill="#c06000"/>
      <ellipse cx="72" cy="26" rx="5" ry="7" fill="#e83030"/>
      <ellipse cx="78" cy="24" rx="4" ry="6" fill="#e83030"/>
      <ellipse cx="90" cy="50" rx="4" ry="6" fill="#e83030"/>
      <ellipse cx="44" cy="60" rx="14" ry="9" fill="#d4a800" transform="rotate(-15 44 60)"/>
      <ellipse cx="22" cy="52" rx="8" ry="5" fill="#c49000" transform="rotate(-40 22 52)"/>
      <ellipse cx="20" cy="58" rx="8" ry="5" fill="#d4a800" transform="rotate(-55 20 58)"/>
      <line x1="46" y1="82" x2="38" y2="96" stroke="#e07b00" stroke-width="4" stroke-linecap="round"/>
      <line x1="54" y1="82" x2="62" y2="98" stroke="#e07b00" stroke-width="4" stroke-linecap="round"/>
      <line x1="38" y1="96" x2="28" y2="96" stroke="#e07b00" stroke-width="3" stroke-linecap="round"/>
      <line x1="62" y1="98" x2="72" y2="98" stroke="#e07b00" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <div id="eggWrap" onclick="eggClick()">
    <div id="egg">Click<br>me!</div>
  </div>

</div>

<script>
// ─── CANVAS FACE SETUP ────────────────────────────────────
const canvas = document.getElementById('faceCanvas');
const ctx    = canvas.getContext('2d');
const SIZE   = 140;
const R      = SIZE / 2;

const img = new Image();
img.src = 'photo.jpg';

// mouthOpen: 0 = closed, 1 = fully open
let mouthOpen    = 0;
let mouthTarget  = 0;
let chompPhase   = false; // true during snap-shut chomp

img.onload = () => {
  faceY = window.innerHeight * 0.5 - R;
  placeFace(faceX, faceY);
  faceWrap.style.display = 'block';
  mouthTarget = 0.18; // resting — slight teeth show
  renderLoop();
};

function renderLoop() {
  drawFace();
  requestAnimationFrame(renderLoop);
}

function drawFace() {
  ctx.clearRect(0, 0, SIZE, SIZE);

  // Clip everything to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(R, R, R, 0, Math.PI * 2);
  ctx.clip();

  // Draw photo
  ctx.drawImage(img, 0, 0, SIZE, SIZE);

  // Smooth lerp toward target
  mouthOpen += (mouthTarget - mouthOpen) * 0.18;

  if (mouthOpen > 0.04) {
    drawMouth(mouthOpen);
  }

  ctx.restore();

  // White border ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(R, R, R - 2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 4;
  ctx.stroke();
  ctx.restore();
}

function drawMouth(t) {
  // Mouth sits in the lower-centre of the face photo
  const mx   = R;
  const my   = SIZE * 0.76;
  const mw   = SIZE * 0.40 * t;   // half-width
  const mh   = SIZE * 0.18 * t;   // half-height

  // ── Dark throat ──
  ctx.beginPath();
  ctx.ellipse(mx, my, mw, mh, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#0d0005';
  ctx.fill();

  // ── Tongue ──
  if (t > 0.15) {
    const tongueAlpha = Math.min(1, (t - 0.15) / 0.35);
    ctx.globalAlpha = tongueAlpha;
    ctx.beginPath();
    ctx.ellipse(mx, my + mh * 0.28, mw * 0.58, mh * 0.62, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#d96068';
    ctx.fill();
    // Tongue centre crease
    ctx.beginPath();
    ctx.moveTo(mx, my - mh * 0.05);
    ctx.quadraticCurveTo(mx, my + mh * 0.3, mx, my + mh * 0.85);
    ctx.strokeStyle = 'rgba(160,50,55,0.45)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ── Upper teeth ──
  if (t > 0.2) {
    const toothAlpha = Math.min(1, (t - 0.2) / 0.4);
    ctx.globalAlpha = toothAlpha;
    const numT   = 5;
    const totalW = mw * 1.72;
    const tW     = totalW / numT;
    const tH     = mh * 0.55;
    const tTop   = my - mh * 0.52;
    const startX = mx - totalW / 2;

    for (let i = 0; i < numT; i++) {
      const tx = startX + i * tW + tW * 0.07;
      const tw = tW * 0.84;
      // tooth body
      ctx.fillStyle = '#f2f0ea';
      roundRect(ctx, tx, tTop, tw, tH, 2);
      ctx.fill();
      // subtle shading on right side
      ctx.fillStyle = 'rgba(180,175,165,0.4)';
      roundRect(ctx, tx + tw * 0.6, tTop, tw * 0.35, tH, [0, 2, 2, 0]);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ── Lower teeth (just a hint) ──
  if (t > 0.35) {
    const la = Math.min(1, (t - 0.35) / 0.35);
    ctx.globalAlpha = la * 0.7;
    const numB   = 4;
    const totalW = mw * 1.3;
    const tW     = totalW / numB;
    const tH     = mh * 0.38;
    const tBot   = my + mh * 0.5;
    const startX = mx - totalW / 2;

    for (let i = 0; i < numB; i++) {
      const tx = startX + i * tW + tW * 0.1;
      const tw = tW * 0.78;
      ctx.fillStyle = '#ede9e0';
      roundRect(ctx, tx, tBot - tH, tw, tH, 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// Polyfill for roundRect drawing
function roundRect(ctx, x, y, w, h, r) {
  if (typeof r === 'number') r = [r, r, r, r];
  const [tl, tr, br, bl] = r;
  ctx.beginPath();
  ctx.moveTo(x + tl, y);
  ctx.lineTo(x + w - tr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + tr);
  ctx.lineTo(x + w, y + h - br);
  ctx.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
  ctx.lineTo(x + bl, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - bl);
  ctx.lineTo(x, y + tl);
  ctx.quadraticCurveTo(x, y, x + tl, y);
  ctx.closePath();
}

// ─── GAME STATE ──────────────────────────────────────────
let score          = 0;
let firstEatDone   = false;
let state          = 'idle';
let chickenStopX   = 0, chickenStopY = 0;
let faceX          = 80, faceY = 0;
let dragActive     = false, ox = 0, oy = 0;
let chickenCurrentX = -100;

const chicken  = document.getElementById('chicken');
const faceWrap = document.getElementById('faceWrap');
const launchBtn = document.getElementById('launchBtn');
const hint      = document.getElementById('hint');
const scoreNum  = document.getElementById('scoreNum');
const expLayer  = document.getElementById('explosionLayer');
const dragArrow = document.getElementById('dragArrow');

// ─── LAUNCH ──────────────────────────────────────────────
function launchChicken() {
  if (state !== 'idle') return;
  state = 'running';
  launchBtn.disabled = true;
  hint.textContent = 'The chicken is running! 🏃';
  dragArrow.style.display = 'none';

  const minY = window.innerHeight * 0.48;
  const maxY = window.innerHeight * 0.80;
  chickenStopY = minY + Math.random() * (maxY - minY);
  chickenStopX = window.innerWidth * (.35 + Math.random() * .46);

  chickenCurrentX = -90;
  chicken.style.left      = chickenCurrentX + 'px';
  chicken.style.top       = (chickenStopY - 40) + 'px';
  chicken.style.display   = 'block';
  chicken.style.opacity   = '1';
  chicken.style.transform = '';
  chicken.style.transition = '';
  chicken.className       = 'running';

  runChicken();
}

function runChicken() {
  const speed = 5 + score * 0.4;
  chickenCurrentX += speed;
  chicken.style.left = chickenCurrentX + 'px';

  if (chickenCurrentX < chickenStopX) {
    requestAnimationFrame(runChicken);
  } else {
    chickenCurrentX = chickenStopX;
    chicken.style.left = chickenStopX + 'px';
    chicken.className = 'stopped';
    state = 'stopped';
    hint.textContent = 'Drag the face to eat the chicken! 🍗';
    dragArrow.style.display = 'block';
  }
}

// ─── DRAG ────────────────────────────────────────────────
function placeFace(x, y) {
  faceX = x; faceY = y;
  faceWrap.style.left = x + 'px';
  faceWrap.style.top  = y + 'px';
}

faceWrap.addEventListener('pointerdown', e => {
  if (state !== 'stopped') return;
  dragActive = true;
  faceWrap.setPointerCapture(e.pointerId);
  const r = faceWrap.getBoundingClientRect();
  ox = e.clientX - r.left;
  oy = e.clientY - r.top;
});

faceWrap.addEventListener('pointermove', e => {
  if (!dragActive) return;
  placeFace(e.clientX - ox, e.clientY - oy);
  checkProximity();
});

faceWrap.addEventListener('pointerup', () => { dragActive = false; });

function checkProximity() {
  if (state !== 'stopped') return;

  // Face mouth world position (centre-x, lower-third-y of the circle)
  const mouthWX = faceX + R;
  const mouthWY = faceY + SIZE * 0.76;

  // Chicken centre
  const cx = chickenStopX + 40;
  const cy = chickenStopY + 0;
  const d  = Math.hypot(mouthWX - cx, mouthWY - cy);

  // Scale mouth open 0→1 as distance goes 110→45
  const farDist  = 110;
  const nearDist = 45;
  if (d < farDist) {
    const t = 1 - Math.min(1, (d - nearDist) / (farDist - nearDist));
    mouthTarget = 0.18 + t * 0.82; // 0.18 resting → 1.0 full gape
  } else {
    mouthTarget = 0.18;
  }

  // Chicken gets scared when face is close
  if (d < 90) {
    if (!chicken.classList.contains('scared') && !chicken.classList.contains('beingEaten')) {
      chicken.className = 'scared';
    }
  } else {
    if (chicken.classList.contains('scared')) {
      chicken.className = 'stopped';
    }
  }

  faceWrap.classList.toggle('near', d < farDist && d >= nearDist);

  if (d < nearDist) {
    eat();
  }
}

// ─── EAT ─────────────────────────────────────────────────
function eat() {
  if (state !== 'stopped') return;
  state = 'eating';
  dragActive = false;
  faceWrap.classList.remove('near');
  faceWrap.classList.add('eating');

  // Mouth already open from proximity — slam it to 1
  mouthTarget = 1;

  // Animate chicken flying into the mouth
  const mouthWX = faceX + R;
  const mouthWY = faceY + SIZE * 0.76;
  const cLeft   = parseFloat(chicken.style.left);
  const cTop    = parseFloat(chicken.style.top);
  const dx      = mouthWX - (cLeft + 40);
  const dy      = mouthWY - (cTop + 40);

  chicken.className = 'beingEaten';
  chicken.style.transition = 'transform 0.32s ease-in, opacity 0.32s ease-in';
  chicken.style.transform  = `translate(${dx}px, ${dy}px) scale(0.05)`;
  chicken.style.opacity    = '0';

  // After chicken reaches mouth: snap shut then explode
  setTimeout(() => {
    chicken.style.display = 'none';
    // Chomp: slam shut
    mouthTarget = 0;
    setTimeout(() => {
      // Burst back open for the explosion
      mouthTarget = 0.9;
      explode();
    }, 180);
  }, 340);
}

// ─── EXPLODE ─────────────────────────────────────────────
function explode() {
  state = 'exploding';
  faceWrap.classList.remove('eating');

  score++;
  scoreNum.textContent = score;

  const bx = faceX + R, by = faceY + R;

  addEl('div', 'bigBoom', { left: (bx - 45) + 'px', top: (by - 45) + 'px' }, '💥');

  const featherEmojis = ['🪶','🪶','🪶','✨','⭐','🔥','💫'];
  for (let i = 0; i < 14; i++) {
    const angle = (i / 14) * Math.PI * 2;
    const dist  = 90 + Math.random() * 150;
    addEl('div', 'feather', {
      left: (bx - 14) + 'px', top: (by - 14) + 'px',
      '--tx': (Math.cos(angle) * dist) + 'px',
      '--ty': (Math.sin(angle) * dist) + 'px',
      '--rot': (Math.random() * 720 - 360) + 'deg',
      '--dur': (.5 + Math.random() * .6) + 's',
    }, featherEmojis[i % featherEmojis.length]);
  }

  const sparkColors = ['#ff0','#ff6600','#ff0000','#fff','#ffd700'];
  for (let i = 0; i < 24; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = 40 + Math.random() * 130;
    addEl('div', 'spark', {
      left: (bx - 5) + 'px', top: (by - 5) + 'px',
      width: (6 + Math.random() * 12) + 'px',
      height: (6 + Math.random() * 12) + 'px',
      background: sparkColors[Math.floor(Math.random() * sparkColors.length)],
      '--tx': (Math.cos(angle) * dist) + 'px',
      '--ty': (Math.sin(angle) * dist) + 'px',
      '--dur': (.3 + Math.random() * .5) + 's',
    });
  }

  const labels = ['NOM!', 'CHOMPED!', 'DEVOURED!', 'DELICIOUS!', 'FEAST!'];
  addEl('div', 'comboText',
    { left: (bx - 80) + 'px', top: (by - 40) + 'px', width: '200px', textAlign: 'center' },
    labels[Math.floor(Math.random() * labels.length)]
  );

  setTimeout(() => {
    expLayer.innerHTML = '';
    if (!firstEatDone) {
      firstEatDone = true;
      launchBalloon();
    } else {
      resetRound();
    }
  }, 1200);
}

// ─── BALLOON SEQUENCE ────────────────────────────────────
const balloonWrap   = document.getElementById('balloonWrap');
const flashOverlay  = document.getElementById('flashOverlay');
const lightningBolt = document.getElementById('lightningBolt');
const stupidText    = document.getElementById('stupidText');
const restartBtn    = document.getElementById('restartBtn');
const restartChicken = document.getElementById('restartChicken');
const eggWrap       = document.getElementById('eggWrap');

function launchBalloon() {
  state = 'balloon';
  // Hide the face and HUD so balloon is the focus
  faceWrap.style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('hint').style.display = 'none';

  balloonWrap.className = '';
  void balloonWrap.offsetWidth;
  balloonWrap.classList.add('floating');
}

function popBalloon() {
  if (state !== 'balloon') return;
  state = 'lightning';

  balloonWrap.classList.add('popping');

  // Burst confetti from balloon
  const bRect = balloonWrap.getBoundingClientRect();
  const bx = bRect.left + bRect.width / 2;
  const by = bRect.top + bRect.height / 3;
  const colors = ['#ff0','#ff4400','#fff','#ff88ff','#00ffff'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'spark';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 30 + Math.random() * 100;
    p.style.cssText = `
      left:${bx - 5}px; top:${by - 5}px;
      width:${8+Math.random()*8}px; height:${8+Math.random()*8}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      position:fixed; border-radius:50%; z-index:602; pointer-events:none;
      --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px;
      --dur:${.4+Math.random()*.4}s;
      animation: sparkFly var(--dur) ease-out forwards;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }

  // Trigger lightning after pop animation
  setTimeout(triggerLightning, 380);
}

function triggerLightning() {
  flashOverlay.className = '';
  lightningBolt.className = '';
  void flashOverlay.offsetWidth;
  flashOverlay.classList.add('flashing');
  lightningBolt.classList.add('striking');

  // STUPID appears while flash is still bright
  setTimeout(() => {
    stupidText.style.transform = '';
    stupidText.className = 'visible';

    // After 3s, hide STUPID and show restart button
    setTimeout(() => {
      stupidText.classList.remove('visible');
      stupidText.classList.add('hiding');
      setTimeout(() => {
        stupidText.className = '';
        stupidText.style.transform = 'translate(-50%, -50%) scale(0)';
        showRestartButton();
      }, 520);
    }, 3000);
  }, 750);
}

function showRestartButton() {
  restartBtn.classList.remove('visible');
  void restartBtn.offsetWidth;
  restartBtn.classList.add('visible');
}

function startRestartSequence() {
  restartBtn.classList.remove('visible');
  restartBtn.style.display = 'none';
  balloonWrap.className = '';

  // Chicken bounces up from bottom
  restartChicken.className = 'entering';
  restartChicken.style.display = 'block';

  // After it lands, do laying animation
  setTimeout(() => {
    restartChicken.className = 'laying';

    // Egg appears mid-lay
    setTimeout(() => {
      eggWrap.classList.add('visible');
    }, 400);
  }, 560);
}

function eggClick() {
  eggWrap.className = '';
  eggWrap.style.display = 'none';
  restartChicken.className = '';
  restartChicken.style.display = 'none';
  flashOverlay.className = '';
  stupidText.className = '';
  stupidText.style.transform = 'translate(-50%, -50%) scale(0)';

  // Full reset — including firstEatDone so the sequence can play again
  firstEatDone = false;
  score = 0;
  scoreNum.textContent = '0';

  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hint').style.display = 'block';
  faceWrap.style.display = 'block';
  mouthTarget = 0.18;

  resetRound();
}

function addEl(tag, cls, styles, text) {
  const el = document.createElement(tag);
  el.className = cls;
  for (const [k, v] of Object.entries(styles)) {
    if (k.startsWith('--')) el.style.setProperty(k, v);
    else el.style[k] = v;
  }
  if (text !== undefined) el.textContent = text;
  expLayer.appendChild(el);
  return el;
}

// ─── RESET ───────────────────────────────────────────────
function resetRound() {
  state = 'idle';
  chicken.className = '';
  chicken.style.display    = 'none';
  chicken.style.transform  = '';
  chicken.style.opacity    = '1';
  chicken.style.transition = '';
  launchBtn.disabled = false;
  hint.textContent = 'Click the button to send a chicken running!';
  dragArrow.style.display = 'block';
  mouthTarget = 0.18; // back to resting open

  faceX = 80;
  faceY = window.innerHeight * .5 - R;
  placeFace(faceX, faceY);
}
</script>
</body>
